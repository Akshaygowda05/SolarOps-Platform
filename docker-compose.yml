version: "3.9"

services:

  frontend:
    build: ./userManagementFrontend
    ports:
      - "8081:80"

    depends_on:
      - backend

  backend:
    build: ./userManagmentBackend

    ports:
      - "3000:3000"

    env_file:
      - ./userManagmentBackend/.env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - db
      - redis

  db:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    ports:
      - "6379:6379"

volumes:
  postgres_data: