services:

  frontend:
    build:
      context: ./userManagementFrontend
      dockerfile: Dockerfile

    container_name: frontend

    ports:
      - "80:80"

    restart: unless-stopped

    depends_on:
      - backend

  backend:
    build:
      context: ./userManagmentBackend
      dockerfile: Dockerfile

    container_name: backend

    ports:
      - "3000:3000"

    restart: unless-stopped

    env_file:
      - ./userManagmentBackend/.env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myapp
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - db
      - redis

    command: >
      sh -c "
      npx prisma migrate deploy &&
      npm start
      "

  db:
    image: postgres:16

    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: redis

    restart: unless-stopped

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: